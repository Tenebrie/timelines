version: 2

updates:
  # Root
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
    groups:
      npm-minor-patch:
        update-types: ['minor', 'patch']

  # Styx
  - package-ecosystem: 'npm'
    directory: '/app/styx-frontend'
    schedule:
      interval: 'weekly'
    groups:
      npm-minor-patch:
        update-types: ['minor', 'patch']

  - package-ecosystem: 'docker'
    directory: '/app/styx-frontend'
    schedule:
      interval: 'weekly'

  # Rhea
  - package-ecosystem: 'npm'
    directory: '/app/rhea-backend'
    schedule:
      interval: 'weekly'
    groups:
      npm-minor-patch:
        update-types: ['minor', 'patch']

  - package-ecosystem: 'docker'
    directory: '/app/rhea-backend'
    schedule:
      interval: 'weekly'

  # Calliope
  - package-ecosystem: 'npm'
    directory: '/app/calliope-websockets'
    schedule:
      interval: 'weekly'
    groups:
      npm-minor-patch:
        update-types: ['minor', 'patch']

  - package-ecosystem: 'docker'
    directory: '/app/calliope-websockets'
    schedule:
      interval: 'weekly'

  # Orpheus
  - package-ecosystem: 'npm'
    directory: '/app/orpheus-mcp'
    schedule:
      interval: 'weekly'
    groups:
      npm-minor-patch:
        update-types: ['minor', 'patch']

  - package-ecosystem: 'docker'
    directory: '/app/orpheus-mcp'
    schedule:
      interval: 'weekly'

  # Thetis
  - package-ecosystem: 'npm'
    directory: '/app/thetis-landing'
    schedule:
      interval: 'weekly'
    groups:
      npm-minor-patch:
        update-types: ['minor', 'patch']

  - package-ecosystem: 'docker'
    directory: '/app/thetis-landing'
    schedule:
      interval: 'weekly'

  # ts-shared
  - package-ecosystem: 'npm'
    directory: '/app/ts-shared'
    schedule:
      interval: 'weekly'
    groups:
      npm-minor-patch:
        update-types: ['minor', 'patch']

  # Gatekeeper
  - package-ecosystem: 'docker'
    directory: '/app/gatekeeper-proxy'
    schedule:
      interval: 'weekly'

  # Chronos
  - package-ecosystem: 'docker'
    directory: '/app/chronos-backups'
    schedule:
      interval: 'weekly'

  # E2E Tests
  - package-ecosystem: 'npm'
    directory: '/test/e2e'
    schedule:
      interval: 'weekly'
    groups:
      npm-minor-patch:
        update-types: ['minor', 'patch']

  # GitHub Actions
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
    groups:
      actions-minor-patch:
        update-types: ['minor', 'patch']
